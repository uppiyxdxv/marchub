<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – MarcHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
  emailjs.init('rwHZkgqFwOWu7Cs9o'); // 🔧 replace with your actual public key
  </script>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--bg); }
    .auth-page { background: radial-gradient(ellipse at 80% 20%, rgba(0,245,196,0.1), transparent 50%), radial-gradient(ellipse at 10% 70%, rgba(249,115,22,0.08), transparent 50%), var(--bg); }
    .back-link { position: fixed; top: 1.5rem; left: 2rem; color: var(--muted); font-size: 0.9rem; z-index:10; }
    .back-link:hover { color: var(--accent); }
     @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<a href="../index.html" class="back-link">← Back to Home</a>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon"><img src="../images/logo.png" alt="MarcHub Logo" class="site-logo"></span> MarcHub</div>
    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join 2,400+ students learning to code.</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name"/>
      <div class="form-error" id="name-err">Name is required.</div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
      <div class="form-error" id="email-err">Please enter a valid email.</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"/>
      <div class="form-error" id="pass-err">Password must be at least 6 characters.</div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password"/>
      <div class="form-error" id="confirm-err">Passwords do not match.</div>
    </div>
    <div class="form-error" id="reg-err" style="margin-bottom:0.5rem;font-size:0.9rem;"></div>
    <button class="btn-full" id="registerBtn">Create Account →</button>
    <div class="auth-switch">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</div>

<script src="../js/main.js?v=2"></script>
<script>
 const sess = AuthDB.getSession();
 if (sess) {
   AuthDB.getUser(sess.email).then(u => { if (u) window.location.href = 'dashboard.html'; });
 }
const registerBtn = document.getElementById('registerBtn');

registerBtn.addEventListener('click', async () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;

  let valid = true;

  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('input').forEach(i => i.classList.remove('input-error'));

  if (!name) {
    document.getElementById('name-err').classList.add('show');
    document.getElementById('name').classList.add('input-error');
    valid = false;
  }

  if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
    document.getElementById('email-err').classList.add('show');
    document.getElementById('email').classList.add('input-error');
    valid = false;
  }

  if (!password || password.length < 6) {
    document.getElementById('pass-err').classList.add('show');
    document.getElementById('password').classList.add('input-error');
    valid = false;
  }

  if (password !== confirm) {
    document.getElementById('confirm-err').classList.add('show');
    document.getElementById('confirm-password').classList.add('input-error');
    valid = false;
  }

  if (!valid) return;

  registerBtn.textContent = 'Creating account...';
  registerBtn.disabled = true;

  try {
    const response = await fetch(`${BACKEND}/register`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        name,
        email,
        password
      })
    });

    const result = await response.json();

    if (result.success) {

  try {
    await emailjs.send(
      "service_63ztzjj",
      "template_0gbkr7y",
      {
        user_name: name,
        user_email: email,
        registered_at: new Date().toLocaleString("en-IN")
      }
    );
  } catch (mailError) {
    console.error("Email Error:", mailError);
  }

  showToast('Account created! Welcome to MarcHub 🚀', 'success');

  setTimeout(() => {
    window.location.href = 'login.html';
  }, 1000);


    } else {
      const err = document.getElementById('reg-err');
      err.textContent = result.message;
      err.classList.add('show');
    }

  } catch (error) {
    console.error(error);

    const err = document.getElementById('reg-err');
    err.textContent = 'Cannot connect to server';
    err.classList.add('show');
  }

  registerBtn.textContent = 'Create Account →';
  registerBtn.disabled = false;
});

document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') registerBtn.click();
  });
});

</script>
</body>
</html>
