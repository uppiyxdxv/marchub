<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard – MarcHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{background:var(--bg);}
    .dashboard{padding:7rem 5% 4rem;min-height:100vh;}
    /* Profile card */
    .profile-card{display:flex;align-items:center;gap:1.5rem;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem 2rem;margin-bottom:2rem;flex-wrap:wrap;}
    .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:var(--bg);flex-shrink:0;overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .profile-info h2{font-size:1.4rem;font-weight:800;margin-bottom:.2rem;}
    .profile-info p{color:var(--muted);font-size:.88rem;}
    .profile-actions{margin-left:auto;display:flex;gap:.75rem;flex-wrap:wrap;}
    /* Tabs */
    .tab-row{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap;}
    .tab-btn{padding:.6rem 1.2rem;border-radius:8px;border:1px solid var(--card-border);background:transparent;color:var(--muted);font-family:var(--font-display);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
    .tab-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
    .tab-panel{display:none;}.tab-panel.active{display:block;}
    /* Stats row */
    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.2rem;text-align:center;}
    .stat-box .n{font-size:2rem;font-weight:800;color:var(--accent);font-family:var(--font-mono);}
    .stat-box .l{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.2rem;}
    /* Course cards */
    .course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
    .c-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;position:relative;}
    .c-card-top{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;}
    .c-icon{font-size:1.8rem;}
    .c-card h4{font-size:1.1rem;font-weight:800;}
    .c-badge{font-size:.75rem;font-family:var(--font-mono);padding:.2rem .6rem;border-radius:99px;background:rgba(0,245,196,.1);color:var(--accent);border:1px solid rgba(0,245,196,.2);}
    .prog-bar{height:6px;background:rgba(255,255,255,.1);border-radius:99px;margin:1rem 0 .3rem;}
    .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
    .prog-label{font-size:.75rem;color:var(--muted);font-family:var(--font-mono);}
    /* Tasks */
    .task-list{display:flex;flex-direction:column;gap:.75rem;margin-top:1rem;}
    .task-item{background:rgba(255,255,255,.03);border:1px solid var(--card-border);border-radius:10px;padding:1rem;}
    .task-item h5{font-size:.95rem;font-weight:700;margin-bottom:.3rem;}
    .task-item p{font-size:.82rem;color:var(--muted);margin-bottom:.75rem;}
    .task-item .due{font-size:.75rem;font-family:var(--font-mono);color:var(--accent3);}
    .task-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
    .submitted-badge{font-size:.75rem;padding:.2rem .7rem;border-radius:99px;background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3);}
    .pending-badge{font-size:.75rem;padding:.2rem .7rem;border-radius:99px;background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2);}
    /* Submit form */
    .submit-form{margin-top:.75rem;}
    .submit-form textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:8px;padding:.75rem;color:var(--text);font-family:var(--font-display);font-size:.85rem;resize:vertical;outline:none;}
    .submit-form textarea:focus{border-color:var(--accent);}
    .submit-form button{margin-top:.5rem;padding:.5rem 1.2rem;border-radius:8px;background:var(--accent);border:none;color:var(--bg);font-weight:700;font-size:.85rem;cursor:pointer;font-family:var(--font-display);}
    /* Certificate */
    .cert-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;font-weight:700;font-size:.9rem;cursor:pointer;border:none;font-family:var(--font-display);margin-top:1rem;width:100%;justify-content:center;transition:all .3s;}
    .cert-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(245,158,11,.4);}
    .cert-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    /* Settings */
    .settings-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:2rem;max-width:560px;}
    .settings-card h3{font-size:1.2rem;font-weight:800;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--card-border);}
    .avatar-upload{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;}
    .avatar-lg{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:var(--bg);overflow:hidden;flex-shrink:0;}
    .avatar-lg img{width:100%;height:100%;object-fit:cover;}
    .upload-btn{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--card-border);color:var(--muted);font-size:.85rem;cursor:pointer;background:none;font-family:var(--font-display);transition:all .2s;}
    .upload-btn:hover{border-color:var(--accent);color:var(--accent);}
    /* WhatsApp btn */
    .wa-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;background:#25d366;border-radius:8px;color:#fff;font-size:.8rem;font-weight:700;margin-top:.75rem;transition:all .2s;}
    .wa-btn:hover{background:#1da853;}
    /* Cert modal */
    .cert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;}
    .cert-overlay.show{display:flex;}
    .cert-paper{background:#fff;border-radius:12px;padding:3rem;max-width:600px;width:90%;text-align:center;position:relative;}
    .cert-paper h1{font-size:2rem;color:#1a1a1a;font-weight:800;margin:.5rem 0;}
    .cert-paper .sub{color:#666;margin-bottom:1.5rem;}
    .cert-paper .name{font-size:1.8rem;color:#7c3aed;font-weight:800;border-bottom:2px solid #7c3aed;display:inline-block;padding-bottom:.3rem;margin:1rem 0;}
    .cert-paper .course-nm{font-size:1.2rem;color:#1a1a1a;font-weight:600;margin-top:.5rem;}
    .cert-paper .date{color:#666;font-size:.85rem;margin-top:1rem;}
    .cert-paper .seal{font-size:3rem;margin:1rem 0;}
    .cert-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;}
    .btn-print{margin-top:1.5rem;padding:.75rem 2rem;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;}
    /* Logout */
    .logout-btn{padding:.6rem 1.4rem;border-radius:8px;border:1px solid var(--card-border);color:var(--muted);cursor:pointer;font-family:var(--font-display);font-size:.9rem;background:none;transition:all .2s;}
    .logout-btn:hover{border-color:#ef4444;color:#ef4444;}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
    .empty-state .big{font-size:3rem;margin-bottom:1rem;}
    .section-sep{margin:2rem 0;border:none;border-top:1px solid var(--card-border);}
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-logo"><span class="logo-icon">⬡</span> MarcHub</div>
  <ul class="nav-links">
    <li><a href="../index.html#courses">Courses</a></li>
    <li><a href="enroll.html" class="btn-nav btn-primary-nav">+ Enroll</a></li>
    <li><button class="logout-btn" id="logoutBtn">Logout</button></li>
  </ul>
</nav>

<div class="dashboard">
  <!-- Profile Card -->
  <div class="profile-card" id="profileCard">
    <div class="avatar" id="avatarEl"></div>
    <div class="profile-info">
      <h2 id="profileName">Loading…</h2>
      <p id="profileEmail"></p>
      <p id="profilePhone" style="margin-top:.2rem;"></p>
      <p id="profileBio" style="margin-top:.3rem;font-style:italic;"></p>
    </div>
    <div class="profile-actions">
      <button class="tab-btn" onclick="switchTab('settings')">⚙ Settings</button>
      <a href="enroll.html" class="btn-hero" style="padding:.6rem 1.2rem;font-size:.9rem;">+ New Course</a>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-row" id="statRow"></div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('courses')" id="tab-courses">📚 My Courses</button>
    <button class="tab-btn" onclick="switchTab('performance')" id="tab-performance">📊 Performance</button>
    <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings">⚙ Settings</button>
  </div>

  <!-- Courses Tab -->
  <div class="tab-panel active" id="panel-courses">
    <div class="course-grid" id="courseGrid"></div>
  </div>

  <!-- Performance Tab -->
  <div class="tab-panel" id="panel-performance">
    <div id="perfContent"></div>
  </div>

  <!-- Settings Tab -->
  <div class="tab-panel" id="panel-settings">
    <div class="settings-card">
      <h3>Profile Settings</h3>
      <div class="avatar-upload">
        <div class="avatar-lg" id="settingsAvatar"></div>
        <div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none"/>
          <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">📷 Change Photo</button>
          <p style="font-size:.78rem;color:var(--muted);margin-top:.4rem;">JPG/PNG, max 2MB</p>
        </div>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="set-name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="set-phone" placeholder="+91 9876543210"/>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea id="set-bio" rows="3" placeholder="Tell us about yourself…" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-family:var(--font-display);font-size:.95rem;resize:vertical;outline:none;"></textarea>
      </div>
      <hr class="section-sep"/>
      <h3>Security Verification</h3>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="set-curpass" placeholder="Enter your current password"/>
        <div class="form-error" id="set-pass-err" style="display:none;color:#ef4444;font-size:.82rem;margin-top:.3rem;">
          Incorrect password.
        </div>
      </div>
      <button class="btn-full" id="saveSettingsBtn">Save Changes →</button>
    </div>
  </div>
</div>

<!-- Certificate Modal -->
<div class="cert-overlay" id="certModal">
  <div class="cert-paper">
    <button class="cert-close" onclick="document.getElementById('certModal').classList.remove('show')">✕</button>
    <div class="seal">🏆</div>
    <div style="font-size:.9rem;color:#888;text-transform:uppercase;letter-spacing:.15em;">Certificate of Completion</div>
    <h1>MarcHub</h1>
    <div class="sub">This certifies that</div>
    <div class="name" id="cert-name"></div>
    <div class="sub">has successfully completed</div>
    <div class="course-nm" id="cert-course"></div>
    <div class="date" id="cert-date"></div>
    <div style="display:flex;justify-content:center;gap:3rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid #eee;">
      <div><div style="border-top:2px solid #333;width:120px;"></div><div style="font-size:.75rem;color:#666;margin-top:.3rem;">Student Signature</div></div>
      <div><div style="border-top:2px solid #333;width:120px;"></div><div style="font-size:.75rem;color:#666;margin-top:.3rem;">MarcHub Director</div></div>
    </div>
    <button class="btn-print" onclick="window.print()">🖨 Print Certificate</button>
  </div>
</div>

<script src="../js/main.js?v=2"></script>
<script>
const COURSE_ICONS={HTML:'🌐',CSS:'🎨',JavaScript:'⚡',Java:'☕',Python:'🐍',SQL:'🗄️',MongoDB:'🍃'};
const COURSE_COLORS={HTML:'#f97316',CSS:'#3b82f6',JavaScript:'#eab308',Java:'#ef4444',Python:'#8b5cf6',SQL:'#06b6d4',MongoDB:'#10b981'};
const WHATSAPP={HTML:'https://chat.whatsapp.com/HF5CbesRF431Xh04YWsdZu',CSS:'https://chat.whatsapp.com/EA78uudDzdqDlkiVttEU6t',JavaScript:'https://chat.whatsapp.com/KuAMJhBewsYJxhfGpICI8E',Java:'https://chat.whatsapp.com/HXlaQbBJW2j5xAMqMsGtmy',Python:'https://chat.whatsapp.com/GWpELotCnw6A40Usb0PtRl',SQL:'https://chat.whatsapp.com/GJCDQZTqG21HloTAMrgT3o',MongoDB:'https://chat.whatsapp.com/Lnx3DYIfzL71OYf0SdMGbh'};

const session=AuthDB.getSession();
if(!session){window.location.href='login.html';}else if(session.isAdmin){window.location.href='admin.html';}

let user=session;
let enrollments=[];

// --- Global functions for onclick handlers ---
function renderAvatar(el,name,avatar){
  if(avatar){el.innerHTML=`<img src="${avatar}" alt="avatar"/>`;}
  else{el.textContent=(name||'U')[0].toUpperCase();}
}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('tab-'+t)?.classList.add('active');
  if(t==='settings') loadSettings();
  if(t==='performance') renderPerformance();
}
function renderPerformance(){
  const el=document.getElementById('perfContent'); if(!el) return;
  if(!enrollments.length){el.innerHTML='<div class="empty-state"><div class="big">📊</div><h3>Enroll in a course to see performance.</h3></div>';return;}
  el.innerHTML=`<div class="course-grid">${enrollments.map(e=>{
    const tasks=AuthDB.getTasks(e.course);
    const subs=AuthDB.getSubmissions(session.email,e.course);
    const prog=tasks.length?Math.round((subs.length/tasks.length)*100):0;
    const color=COURSE_COLORS[e.course]||'#00f5c4';
    const scoreTotal=subs.filter(s=>s.score!==null).reduce((a,s)=>a+s.score,0);
    const scored=subs.filter(s=>s.score!==null).length;
    const avg=scored?Math.round(scoreTotal/scored):null;
    return `<div class="c-card" style="border-top:3px solid ${color};">
      <div class="c-card-top"><span class="c-icon">${COURSE_ICONS[e.course]||'📘'}</span><div><h4>${e.course}</h4></div></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:linear-gradient(90deg,${color},${color}99);"></div></div>
      <div class="prog-label" style="margin-bottom:.75rem;">${prog}% complete</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.82rem;">
        <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:.6rem;text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:var(--accent);">${subs.length}</div><div style="color:var(--muted);">Submitted</div></div>
        <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:.6rem;text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:${color};">${tasks.length-subs.length}</div><div style="color:var(--muted);">Pending</div></div>
        <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:.6rem;text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#f59e0b;">${avg!==null?avg+'%':'—'}</div><div style="color:var(--muted);">Avg Score</div></div>
        <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:.6rem;text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#10b981;">${prog===100?'✓':'✗'}</div><div style="color:var(--muted);">Completed</div></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}
async function loadSettings(){
  const u=await AuthDB.getUser(session.email)||session;
  document.getElementById('set-name').value=u.name||'';
  document.getElementById('set-phone').value=u.phone||'';
  document.getElementById('set-bio').value=u.bio||'';
  renderAvatar(document.getElementById('settingsAvatar'),u.name,u.avatar);
}
function submitTask(email,course,taskId,ansId){
  const answer=document.getElementById(ansId).value.trim();
  if(!answer){showToast('Please write an answer first.','error');return;}
  const r=AuthDB.submitTask(email,course,taskId,answer);
  if(r.ok){showToast('Task submitted! ✓','success');renderCourses();}
  else showToast(r.msg,'error');
}
function openCert(course){
  document.getElementById('cert-name').textContent=user.name||session.name;
  document.getElementById('cert-course').textContent=course+' – MarcHub';
  document.getElementById('cert-date').textContent='Issued: '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('certModal').classList.add('show');
}
function renderCourses(){
  const grid=document.getElementById('courseGrid'); if(!grid) return;
  if(!enrollments.length){
    grid.innerHTML=`<div class="empty-state"><div class="big">📚</div><h3>No courses yet</h3><p>Enroll to start learning.</p><a href="enroll.html" class="btn-hero" style="margin-top:1rem;display:inline-block;">Browse Courses →</a></div>`;
    return;
  }
  grid.innerHTML=enrollments.map(e=>{
    const tasks=AuthDB.getTasks(e.course);
    const subs=AuthDB.getSubmissions(session.email,e.course);
    const prog=tasks.length?Math.round((subs.length/tasks.length)*100):0;
    const done=AuthDB.allTasksSubmitted(session.email,e.course)&&tasks.length>0;
    const color=COURSE_COLORS[e.course]||'#00f5c4';
    const taskHtml=tasks.length===0
      ?`<p style="color:var(--muted);font-size:.82rem;text-align:center;padding:1rem 0;">No tasks assigned yet.</p>`
      :tasks.map(task=>{
        const sub=subs.find(s=>s.taskId===task.id);
        return `<div class="task-item">
          <h5>${task.title}</h5>
          <p>${task.desc||''}</p>
          <div class="task-meta">
            <span class="due">📅 Due: ${task.due||'No deadline'}</span>
            ${sub?`<span class="submitted-badge">✓ Submitted</span>`:`<span class="pending-badge">Pending</span>`}
          </div>
          ${!sub?`<div class="submit-form">
            <textarea id="ans_${task.id}" rows="2" placeholder="Your answer or GitHub link…"></textarea>
            <button onclick="submitTask('${session.email}','${e.course}',${task.id},'ans_${task.id}')">Submit →</button>
          </div>`:''}
        </div>`;
      }).join('');
    return `<div class="c-card" style="border-top:3px solid ${color};">
      <div class="c-card-top">
        <span class="c-icon">${COURSE_ICONS[e.course]||'📘'}</span>
        <div><h4>${e.course}</h4><span class="c-badge">${tasks.length} task${tasks.length!==1?'s':''}</span></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:linear-gradient(90deg,${color},${color}99);"></div></div>
      <div class="prog-label">${prog}% complete · ${subs.length}/${tasks.length} submitted</div>
      <div class="task-list">${taskHtml}</div>
      <a href="${WHATSAPP[e.course]||'#'}" target="_blank" class="wa-btn" style="margin-top:1rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Join Community
      </a>
      <button class="cert-btn" ${!done?'disabled':''} onclick="openCert('${e.course}')">
        ${done?'🏆 View Certificate':'🔒 Complete all tasks to unlock'}
      </button>
    </div>`;
  }).join('');
}

// --- Logout button (always works immediately) ---
document.getElementById('logoutBtn').addEventListener('click',()=>{AuthDB.logout();window.location.href='login.html';});

// --- Init: fetch user profile & enrollment data (async) ---
if(session&&!session.isAdmin){(async()=>{
  try{const u=await AuthDB.getUser(session.email);if(u)user=u;}catch(e){}
  renderAvatar(document.getElementById('avatarEl'),user.name,user.avatar);
  document.getElementById('profileName').textContent=user.name||'Student';
  document.getElementById('profileEmail').textContent=user.email||'';
  if(user.phone)document.getElementById('profilePhone').textContent='📞 '+user.phone;
  if(user.bio)document.getElementById('profileBio').textContent='"'+user.bio+'"';
  const globalEnroll=JSON.parse(localStorage.getItem('lv_enrollments')||'[]');
  let userEnroll=[];
  try{userEnroll=await AuthDB.getEnrollments(session.email);}catch(e){console.warn('Enrollments fetch failed',e);}
  const mergedMap={};
  globalEnroll.filter(e=>e.email===session.email).forEach(e=>mergedMap[e.course]=e);
  userEnroll.forEach(e=>mergedMap[e.course]=Object.assign(mergedMap[e.course]||{},e));
  enrollments=Object.values(mergedMap);
  const totalTasks=enrollments.reduce((a,e)=>a+AuthDB.getTasks(e.course).length,0);
  const totalSubs=enrollments.reduce((a,e)=>a+AuthDB.getSubmissions(session.email,e.course).length,0);
  document.getElementById('statRow').innerHTML=`
    <div class="stat-box"><div class="n">${enrollments.length}</div><div class="l">Courses</div></div>
    <div class="stat-box"><div class="n">${totalTasks}</div><div class="l">Tasks Assigned</div></div>
    <div class="stat-box"><div class="n">${totalSubs}</div><div class="l">Submitted</div></div>
    <div class="stat-box"><div class="n">${enrollments.filter(e=>AuthDB.allTasksSubmitted(session.email,e.course)).length}</div><div class="l">Completed</div></div>`;
  renderCourses();

  // Avatar file upload
  document.getElementById('avatarInput').addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    if(file.size>2*1024*1024){showToast('Image must be under 2MB','error');return;}
    const reader=new FileReader();
    reader.onload=async e=>{
      const avatar=e.target.result;
      await AuthDB.updateProfile(session.email,{avatar});
      renderAvatar(document.getElementById('avatarEl'),user.name,avatar);
      renderAvatar(document.getElementById('settingsAvatar'),user.name,avatar);
      showToast('Photo updated!','success');
    };
    reader.readAsDataURL(file);
  });

  // Save settings
  document.getElementById('saveSettingsBtn').addEventListener('click',async()=>{
    const name=document.getElementById('set-name').value.trim();
    const phone=document.getElementById('set-phone').value.trim();
    const bio=document.getElementById('set-bio').value.trim();
    const curpass=document.getElementById('set-curpass').value;
    const updates={};
    if(name)updates.name=name;
    if(phone)updates.phone=phone;
    if(bio!==undefined)updates.bio=bio;
    if(curpass){
      const pwValid=await AuthDB.verifyPassword(session.email,curpass);
      if(!pwValid){showToast('Current password is incorrect.','error');document.getElementById('set-curpass').value='';return;}
    }
    const r=await AuthDB.updateProfile(session.email,updates);
    document.getElementById('set-curpass').value='';
    if(r.ok){
      const updatedUser=await AuthDB.getUser(session.email)||session;
      renderAvatar(document.getElementById('avatarEl'),updatedUser.name,updatedUser.avatar);
      renderAvatar(document.getElementById('settingsAvatar'),updatedUser.name,updatedUser.avatar);
      showToast('Profile updated! ✓','success');
      document.getElementById('profileName').textContent=updatedUser.name;
      if(updates.phone)document.getElementById('profilePhone').textContent='📞 '+updates.phone;
      if(updates.bio!==undefined)document.getElementById('profileBio').textContent=updates.bio?'"'+updates.bio+'"':'';
    }else showToast(r.msg,'error');
  });
})();}
</script>
</body>
</html>
