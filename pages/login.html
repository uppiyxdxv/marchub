<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – MarcHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--bg); }
    .auth-page { background: radial-gradient(ellipse at 60% 40%, rgba(124,58,237,0.12), transparent 60%), radial-gradient(ellipse at 20% 80%, rgba(0,245,196,0.08), transparent 50%), var(--bg); }
    .back-link { position: fixed; top: 1.5rem; left: 2rem; color: var(--muted); font-size: 0.9rem; z-index:10; }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
<a href="../index.html" class="back-link">← Back to Home</a>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">⬡</span> MarcHub</div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Login to access your courses and dashboard.</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
      <div class="form-error" id="email-err">Please enter a valid email.</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
      <div class="form-error" id="pass-err">Password is required.</div>
    </div>
    <div class="form-error" id="login-err" style="margin-bottom:0.5rem;font-size:0.9rem;"></div>
    <button class="btn-full" id="loginBtn">Login →</button>
    <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
  // Redirect if already logged in
  if (AuthDB.getSession()) window.location.href = 'dashboard.html';

  const loginBtn = document.getElementById('loginBtn');
  loginBtn.addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('input').forEach(i => i.classList.remove('input-error'));

    if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
      document.getElementById('email-err').classList.add('show');
      document.getElementById('email').classList.add('input-error');
      valid = false;
    }
    if (!password) {
      document.getElementById('pass-err').classList.add('show');
      document.getElementById('password').classList.add('input-error');
      valid = false;
    }
    if (!valid) return;

    loginBtn.textContent = 'Logging in…';
    loginBtn.disabled = true;

    setTimeout(() => {
      const result = AuthDB.loginUser(email, password);
      if (result.ok) {
        showToast('Login successful! Welcome back 🎉', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        const err = document.getElementById('login-err');
        err.textContent = result.msg;
        err.classList.add('show');
        loginBtn.textContent = 'Login →';
        loginBtn.disabled = false;
      }
    }, 600);
  });

  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
  });
</script>
