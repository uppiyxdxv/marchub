<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Apply – MarcHub Internship</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{background:var(--bg);}
    .back-link{position:fixed;top:1.5rem;left:2rem;color:var(--muted);font-size:.9rem;z-index:10;}
    .back-link:hover{color:var(--accent);}
  </style>
</head>
<body>
<a href="../index.html" class="back-link">← Back to Home</a>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">💼</span> MarcHub Internship</div>
    <h2 class="auth-title" id="int-title">Apply for Internship</h2>
    <p class="auth-sub" id="int-desc">Fill in your details to apply.</p>
    <div class="form-group"><label>Full Name</label><input type="text" id="app-name" placeholder="Your full name"/></div>
    <div class="form-group"><label>Email</label><input type="email" id="app-email" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="app-phone" placeholder="+91 9876543210"/></div>
    <div class="form-group"><label>Upload Resume (PDF/DOC)</label><input type="file" id="app-resume" accept=".pdf,.doc,.docx" style="width:100%;padding:.6rem;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:10px;color:var(--text);"/></div>
    <div class="form-group"><label>Why are you a good fit?</label><textarea id="app-msg" rows="4" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:10px;padding:.85rem;color:var(--text);font-family:var(--font-display);font-size:.9rem;resize:vertical;outline:none;"></textarea></div>
    <button class="btn-full" id="applyBtn">Submit Application →</button>
    <div id="apply-result" style="margin-top:1rem;"></div>
  </div>
</div>
<script src="../js/main.js?v=3"></script>
<script>
  const params=new URLSearchParams(window.location.search);
  const intId=params.get('id');
  if(!intId){document.querySelector('.auth-card').innerHTML='<h2>Invalid link</h2><p>No internship specified.</p><a href="../index.html" class="btn-hero">Go Home</a>';}

  const sess=AuthDB.getSession();
  if(sess){
    document.getElementById('app-name').value=sess.name||'';
    document.getElementById('app-email').value=sess.email||'';
  }

  let _intName='',_intEmail='';

  document.getElementById('applyBtn').addEventListener('click',async()=>{
    const name=document.getElementById('app-name').value.trim();
    const email=document.getElementById('app-email').value.trim();
    const phone=document.getElementById('app-phone').value.trim();
    const msg=document.getElementById('app-msg').value.trim();
    const resumeFile=document.getElementById('app-resume').files[0];
    if(!name||name.length<2){showToast('Name is required (min 2 chars).','error');return;}
    if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){showToast('Enter a valid email address.','error');return;}
    if(!phone||phone.replace(/\D/g,'').length<7){showToast('Enter a valid phone number (min 7 digits).','error');return;}
    document.getElementById('applyBtn').textContent='Submitting...';
    document.getElementById('applyBtn').disabled=true;
    let resumeBase64='';
    if(resumeFile){
      try{
        resumeBase64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(resumeFile);});
      }catch(e){showToast('Failed to read resume file.','error');document.getElementById('applyBtn').textContent='Submit Application →';document.getElementById('applyBtn').disabled=false;return;}
    }
    const r=await AuthDB.registerForInternship({internshipId:parseInt(intId),name,email,phone,message:msg,resume:resumeBase64});
    document.getElementById('applyBtn').textContent='Submit Application →';
    document.getElementById('applyBtn').disabled=false;
    if(r.success){
      if(resumeBase64){
        const resumes=JSON.parse(localStorage.getItem('lv_int_resumes')||'{}');
        resumes[intId+'_'+email]=resumeBase64;
        localStorage.setItem('lv_int_resumes',JSON.stringify(resumes));
      }
      _intName=name; _intEmail=email;
      document.querySelector('.auth-card').innerHTML=`<h2>✅ Application Submitted!</h2>
        <p style="color:var(--muted);margin-bottom:1.5rem;">Now submit your internship tasks below.</p>
        <hr style="border:none;border-top:1px solid var(--card-border);margin:1rem 0;">
        <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:1rem;">📋 Submit Your Work</h3>
        <div class="form-group"><label>GitHub URL <span style="color:var(--accent3);">*</span></label>
          <input type="url" id="int-github" placeholder="https://github.com/your-repo"/>
          <div id="int-github-err" class="form-error" style="display:none;color:#ef4444;font-size:.82rem;margin-top:.3rem;"></div></div>
        <div class="form-group"><label>LinkedIn Video Post URL <span style="color:var(--accent3);">*</span></label>
          <input type="url" id="int-linkedin" placeholder="https://www.linkedin.com/posts/..."/>
          <div id="int-linkedin-err" class="form-error" style="display:none;color:#ef4444;font-size:.82rem;margin-top:.3rem;"></div></div>
        <button class="btn-full" id="intTaskBtn">Submit Tasks →</button>
        <div id="int-task-err" style="color:#ef4444;font-size:.85rem;margin-top:.5rem;display:none;"></div>`;
      document.getElementById('intTaskBtn').addEventListener('click', submitIntTasks);
    }else{
      showToast(r.message||'Failed to submit','error');
    }
  });

  async function submitIntTasks(){
    const github=document.getElementById('int-github').value.trim();
    const linkedin=document.getElementById('int-linkedin').value.trim();
    document.getElementById('int-github-err').style.display='none';
    document.getElementById('int-linkedin-err').style.display='none';
    document.getElementById('int-task-err').style.display='none';
    if(!github||!/^https?:\/\/github\.com\/[^\s]+$/.test(github)){document.getElementById('int-github-err').textContent='Enter a valid GitHub URL.';document.getElementById('int-github-err').style.display='block';return;}
    if(!linkedin||!/^https?:\/\/(www\.)?linkedin\.com\/[^\s]+$/.test(linkedin)){document.getElementById('int-linkedin-err').textContent='Enter a valid LinkedIn URL.';document.getElementById('int-linkedin-err').style.display='block';return;}
    const btn=document.getElementById('intTaskBtn');
    btn.textContent='Saving...';btn.disabled=true;
    const g=AuthDB.submitInternshipTask(_intEmail,parseInt(intId),'github',github);
    if(!g.ok){document.getElementById('int-task-err').textContent=g.msg;document.getElementById('int-task-err').style.display='block';btn.textContent='Submit Tasks →';btn.disabled=false;return;}
    const l=AuthDB.submitInternshipTask(_intEmail,parseInt(intId),'linkedin',linkedin);
    if(!l.ok){document.getElementById('int-task-err').textContent=l.msg;document.getElementById('int-task-err').style.display='block';btn.textContent='Submit Tasks →';btn.disabled=false;return;}
    document.querySelector('.auth-card').innerHTML='<h2>✅ All Tasks Submitted!</h2><p>Your work has been submitted. The admin will review and verify it.</p><a href="../index.html" class="btn-hero">Back to Home</a>';
    showToast('Tasks submitted! ✓','success');
  }
</script>
</body>
</html>
