<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Apply â€“ MarcHub Internship</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{background:var(--bg);}
    .back-link{position:fixed;top:1.5rem;left:2rem;color:var(--muted);font-size:.9rem;z-index:10;}
    .back-link:hover{color:var(--accent);}
  </style>
</head>
<body>
<a href="../index.html" class="back-link">â† Back to Home</a>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">ðŸ’¼</span> MarcHub Internship</div>
    <h2 class="auth-title" id="int-title">Apply for Internship</h2>
    <p class="auth-sub" id="int-desc">Fill in your details to apply.</p>
    <div class="form-group"><label>Full Name</label><input type="text" id="app-name" placeholder="Your full name"/></div>
    <div class="form-group"><label>Email</label><input type="email" id="app-email" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="app-phone" placeholder="+91 9876543210"/></div>
    <div class="form-group"><label>Why are you a good fit?</label><textarea id="app-msg" rows="4" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:10px;padding:.85rem;color:var(--text);font-family:var(--font-display);font-size:.9rem;resize:vertical;outline:none;"></textarea></div>
    <button class="btn-full" id="applyBtn">Submit Application â†’</button>
    <div id="apply-result" style="margin-top:1rem;"></div>
  </div>
</div>
<script src="../js/main.js?v=2"></script>
<script>
  const params=new URLSearchParams(window.location.search);
  const intId=params.get('id');
  if(!intId){document.querySelector('.auth-card').innerHTML='<h2>Invalid link</h2><p>No internship specified.</p><a href="../index.html" class="btn-hero">Go Home</a>';}

  const sess=AuthDB.getSession();
  if(sess){
    document.getElementById('app-name').value=sess.name||'';
    document.getElementById('app-email').value=sess.email||'';
  }

  document.getElementById('applyBtn').addEventListener('click',async()=>{
    const name=document.getElementById('app-name').value.trim();
    const email=document.getElementById('app-email').value.trim();
    const phone=document.getElementById('app-phone').value.trim();
    const msg=document.getElementById('app-msg').value.trim();
    if(!name||!email){showToast('Name and email are required.','error');return;}
    document.getElementById('applyBtn').textContent='Submitting...';
    document.getElementById('applyBtn').disabled=true;
    const r=await AuthDB.registerForInternship({internshipId:parseInt(intId),name,email,phone,message:msg});
    document.getElementById('applyBtn').textContent='Submit Application â†’';
    document.getElementById('applyBtn').disabled=false;
    if(r.success){
      document.querySelector('.auth-card').innerHTML='<h2>âœ… Application Submitted!</h2><p>We\'ll review your application and get back to you via email.</p><a href="../index.html" class="btn-hero">Back to Home</a>';
    }else{
      showToast(r.message||'Failed to submit','error');
    }
  });
</script>
</body>
</html>
